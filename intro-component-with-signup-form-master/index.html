<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Intro component with sign up form</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <main>
    <section class="intro">
      <h1>Learn to code by watching others</h1>
      <p>
        See how experienced developers solve problems in real-time. Watching scripted tutorials is great, 
        but understanding how developers think is invaluable. 
      </p>
    </section>
    <section class="signup-form">
      <div class="trial-banner">
        <p>
          <strong>Try it free 7 days</strong> then $20/mo. thereafter
        </p>
      </div>
      <form novalidate>
        <div class="form-group">
          <input type="text" name="first-name" placeholder="First Name">
          <img class="error-icon hidden" src="./images/icon-error.svg">
        </div>
        <p class="error-message for-first-name hidden"></p>
        <div class="form-group">
          <input type="text" name="last-name" placeholder="Last Name">
          <img class="error-icon hidden" src="./images/icon-error.svg">
        </div>
        <p class="error-message for-last-name hidden"></p>
        <div class="form-group">
          <input type="email" name="email" placeholder="Email Address">
          <img class="error-icon hidden" src="./images/icon-error.svg">
        </div>
        <p class="error-message for-email hidden"></p>
        <div class="form-group">
          <input type="password" name="password" placeholder="Password">
          <img class="error-icon hidden" src="./images/icon-error.svg">
        </div>
        <p class="error-message for-password hidden"></p>
        <button type="submit">Claim your free trial</button>
        <p>By clicking the button, you are agreeing to our <strong>Terms and Services</strong></p>
      </form>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
