<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Fylo data storage component</title>
</head>
<body>
  <main class="container">
    <article>
      <section class="storage-controls">
      <img src="images/logo.svg" alt="Fylo logo">
      <div class="icons-group">
        <!--Buttons are clikable, make interaction style easy, are announced by screen readers-->
        <button aria-label="Document"><img class="btn-icon" src="images/icon-document.svg" alt=""></button>
        <button aria-label="Folder"><img class="btn-icon" src="images/icon-folder.svg" alt=""></button>
        <button aria-label="Upload"><img class="btn-icon" src="images/icon-upload.svg" alt=""></button>
      </div>
    </section>
    <section class="storage-status">
      <p>You’ve used <span>815 GB</span> of your storage</p>
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
      <div class="storage-limits">
        <span>0 GB</span>
        <span>1000 GB</span>
      </div>
      <div class="storage-left">
        <span class="amount">185</span>
        <p>GB Left</p>
      </div>
    </section>
    </article>
  </main>

  

     
</body>
</html>
