<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Base Apparel coming soon page</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <img src="./images/logo.svg" alt="Base Apparel logo">
    </header>
    <div class="image-container">
      <picture>
        <source srcset="./images/hero-desktop.jpg" media="(min-width: 650px)">
        <img src="./images/hero-mobile.jpg" alt="The picture of the brand ambassador">
      </picture>
    </div>
    <div class="content-container">
      <h1><span>We're</span> coming soon</h1>
      <p>
        Hello fellow shoppers! We're currently building our new fashion store. 
        Add your email below to stay up-to-date with announcements and our launch deals.
      </p>
      <form novalidate>
        <input type="email" name="email" placeholder="Email Address" required id="email-input">
        <img class="hidden" id="error-sign" src="./images/icon-error.svg" aria-hidden="true" alt="">
        <button type="submit" aria-label="Submit button">
          <img src="./images/icon-arrow.svg" alt="" aria-hidden="true">
        </button>
      </form>
      <p class="error-message hidden"></p>
    </div>
  </main>
  <script src="./script.js"></script>
</body>
</html>
